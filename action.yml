name: 'W3 Pyth Action'
description: 'Price oracle for crypto, equities, FX, metals, and more via Pyth Network'
author: 'w3-io'

inputs:
  command:
    description: 'Operation to perform: get-feeds, get-prices, get-historical-prices, submit-on-chain'
    required: true
  api-url:
    description: 'Pyth Hermes API base URL (override for testing/staging)'
    required: false
    default: 'https://hermes.pyth.network'
  ids:
    description: 'Comma-separated price feed IDs (hex strings)'
    required: false
  symbols:
    description: 'Comma-separated token symbols (e.g. "BTC,ETH"). Resolved to feed IDs automatically.'
    required: false
  query:
    description: 'Search string for get-feeds (case-insensitive symbol substring match)'
    required: false
  asset-type:
    description: 'Asset type filter for get-feeds: crypto, equity, fx, metal, rates, commodities, crypto_index'
    required: false
  publish-time:
    description: 'Unix timestamp for get-historical-prices'
    required: false

  # submit-on-chain inputs
  network:
    description: 'EVM chain key for submit-on-chain (avalanche, ethereum, base, arbitrum, optimism, polygon)'
    required: false
  update-data:
    description: 'JSON array of hex strings (the `binary.data` field from a get-prices step), or a single hex string'
    required: false
  rpc-url:
    description: 'Custom RPC URL for submit-on-chain (defaults to the protocol default for `network`)'
    required: false
  value:
    description: 'msg.value (wei) for submit-on-chain — must be ≥ Pyth.getUpdateFee(updateData). Default 10000.'
    required: false
    default: '10000'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
