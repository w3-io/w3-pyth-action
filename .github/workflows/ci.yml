name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    # `@w3-io/action-lint` is a private package in the w3-io org;
    # GITHUB_TOKEN only has access to the current repo's packages,
    # so we need a PAT with `read:packages`. See W3_NPM_TOKEN repo
    # secret — mirrors the pattern in w3-action-template's CI.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.W3_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@w3-io'

      - run: npm ci

      - name: Standards lint
        run: npx @w3-io/action-lint@latest

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist is up to date
        run: |
          git diff --exit-code dist/ || {
            echo "dist/ is out of date. Run 'npm run build' and commit."
            exit 1
          }
